# Docker Compose 编排文件
# 启动命令：docker-compose -f docker/docker-compose.yml up -d

version: "3.8"

services:
  # ==================== FastAPI 后端 ====================
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai_rd_agent_backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ../.env
    volumes:
      # 挂载数据目录以持久化 Chroma 向量库和文档
      - ../data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==================== Streamlit 前端 ====================
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: ai_rd_agent_frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - API_BASE_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

